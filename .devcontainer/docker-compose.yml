name: rg-dez-backend
services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace
    command: sleep infinity
    expose:
      - "5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development

  redis:
    image: redis
    restart: on-failure
    expose:
      - "6379"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  apisix:
    build:
      context: ..
      dockerfile: .devcontainer/apisix.Dockerfile
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APISIX_STAND_ALONE: "true"
    ports:
      - "5000:9080"

volumes:
  postgres_data:
