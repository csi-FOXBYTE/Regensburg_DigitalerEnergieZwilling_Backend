name: rg-dez-backend
services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace
    command: sleep infinity
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://dev:dev@postgres:5432/app
      APP_BASE_URL: localhost:5000
      PUBLIC_CLIENT_BASE_URL: http://localhost:4321
      ADMIN_CLIENT_BASE_URL: http://localhost:5173
      KEYCLOAK_JWKS_URI: http://placeholder/not-used-in-development

  redis:
    image: redis
    restart: on-failure
    expose:
      - "6379"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  apisix:
    build:
      context: ..
      dockerfile: .devcontainer/apisix.Dockerfile
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APISIX_STAND_ALONE: "true"
    ports:
      - "5000:9080"
    networks:
      - default
      - rg-det-shared

volumes:
  postgres_data:

networks:
  rg-det-shared:
    name: rg-det-shared
    driver: bridge
