consumers:
  - username: dev_admin
    plugins:
      jwt-auth:
        key: dev_admin
        secret: dev_admin-secret-change-me

global_rules:
  - id: cors
    plugins:
      cors:
        allow_origins: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://localhost:3000,http://localhost:4321,http://127.0.0.1:4321"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "Authorization,x-access-token,Content-Type,Accept,Origin,X-Requested-With"
        expose_headers: "Content-Disposition"
        max_age: 3600
        allow_credential: false

routes:
  - id: public-api
    uri: /api/public/*
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

  - id: docs-root
    uri: /docs
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

  - id: docs
    uri: /docs/*
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

  - id: admin-api
    uri: /api/admin/*
    plugins:
      jwt-auth: {}
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

#END
