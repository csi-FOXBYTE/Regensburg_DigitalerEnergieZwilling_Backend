consumers:
  - username: dev_admin
    plugins:
      jwt-auth:
        key: dev_admin
        secret: dev_admin-secret-change-me

routes:
  - id: public-api
    uri: /api/public/*
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

  - id: docs-root
    uri: /docs
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

  - id: docs
    uri: /docs/*
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

  - id: admin-api
    uri: /api/admin/*
    plugins:
      jwt-auth: {}
    upstream:
      type: roundrobin
      nodes:
        "dev:5000": 1

#END
